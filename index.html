

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaalimDZ | تسجيل حساب جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/cairo@4.5.0/index.css" rel="stylesheet">
    <style>
        :root {
            --green: #006233;
            --green-light: #008043;
            --green-pale: #e8f5e9;
            --red: #d21034;
            --red-hover: #a50c28;
            --text: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --bg: #f9fafb;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 28px rgba(0,0,0,0.1);
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        .navbar {
            background: var(--white); box-shadow: var(--shadow);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--green); text-decoration: none; }
        .logo span { color: var(--red); }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; transition: 0.2s; }
        .nav-links a:hover { color: var(--red); }

        /* Auth Container */
        .auth-container {
            max-width: 900px; margin: 2rem auto; padding: 0 5%; flex: 1; display: flex; gap: 2rem; align-items: flex-start;
        }
        .auth-card {
            background: var(--white); border-radius: 16px; box-shadow: var(--shadow-lg);
            padding: 2rem; width: 100%; max-width: 600px; margin: 0 auto;
        }
        .auth-header { text-align: center; margin-bottom: 1.5rem; }
        .auth-header h2 { color: var(--green); margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-light); }

        /* Account Type Selection */
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
        .type-card {
            background: var(--bg); border: 2px solid var(--border); border-radius: 10px;
            padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .type-card:hover { border-color: var(--green-light); background: var(--green-pale); }
        .type-card.active { border-color: var(--green); background: var(--green-pale); box-shadow: 0 0 0 2px rgba(0,98,51,0.1); }
        .type-card .icon { font-size: 1.5rem; margin-bottom: 0.3rem; display: block; }
        .type-card span { font-weight: 700; font-size: 0.85rem; }

        /* Form */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.7rem 1rem; border: 2px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; background: var(--white);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--green); box-shadow: 0 0 0 4px rgba(0,98,51,0.08);
        }
        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }

        button[type="button"] {
            width: 100%; padding: 0.8rem; background: var(--green); color: var(--white); border: none;
            border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s;
            margin-top: 0.5rem;
        }
        button[type="button"]:hover { background: var(--green-light); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,98,51,0.2); }

        /* Footer */
        .footer { text-align: center; padding: 2rem; color: var(--text-light); font-size: 0.9rem; border-top: 1px solid var(--border); background: var(--white); margin-top: auto; }
        .footer a { color: var(--green); text-decoration: none; font-weight: 700; }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-container { margin: 1rem auto; }
            .type-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 0; }
            .navbar { padding: 0.8rem 5%; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="logo">Taalim<span>DZ</span></a>
        <div class="nav-links">
            <a href="#">الرئيسية</a>
            <a href="#">المساعدة</a>
        </div>
    </nav>

    <!-- Registration Card -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>إنشاء حساب جديد</h2>
                <p>انضم إلى منصة تعليمDZ وابدأ رحلتك التعليمية</p>
            </div>

            <!-- User Type -->
            <label style="font-weight:700; margin-bottom:0.5rem; display:block;">نوع الحساب</label>
            <div class="type-grid" id="typeGrid">
                <div class="type-card active" onclick="selectType(this, 'tlemidh')">
                    <span class="icon">🎓</span>
                    <span>تلميذ</span>
                </div>
                <div class="type-card" onclick="selectType(this, 'wali')">
                    <span class="icon">👨‍👩‍👧‍👦</span>
                    <span>ولي أمر</span>
                </div>
                <div class="type-card" onclick="selectType(this, 'ostath')">
                    <span class="icon">👨‍🏫</span>
                    <span>أستاذ</span>
                </div>
            </div>

            <!-- Form -->
            <div id="regForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>الولاية</label>
                        <select id="wilaya" onchange="updateDaïras()">
                            <option value="">اختر الولاية</option>
                            <option value="01">01 - أدرار</option>
                            <option value="02">02 - الشلف</option>
                            <option value="03">03 - الأغواط</option>
                            <option value="04">04 - أم البواقي</option>
                            <option value="05">05 - باتنة</option>
                            <option value="06">06 - بجاية</option>
                            <option value="07">07 - بسكرة</option>
                            <option value="08">08 - بشار</option>
                            <option value="09">09 - البليدة</option>
                            <option value="16">16 - الجزائر</option>
                            <option value="31">31 - وهران</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الدائرة / البلدية</label>
                        <select id="daira">
                            <option value="">اختر الولاية أولاً</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>المؤسسة التربوية</label>
                    <input type="text" placeholder="اكتب اسم المؤسسة (ابتدائية، متوسطة...)">
                </div>

                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" placeholder="أدخل اسمك الكامل بالعربية">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" placeholder="0XXXXXXXXX">
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <button type="button" onclick="alert('شكراً لتسجيلك! سيتم تفعيل حسابك قريباً')">إنشاء حساب</button>
            </div>
            
            <p style="text-align:center; margin-top:1rem; color:var(--text-light); font-size:0.9rem;">
                لديك حساب بالفعل؟ <a href="#" style="color:var(--red); font-weight:700;">تسجيل الدخول</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 TaalimDZ. جميع الحقوق محفوظة. | <a href="#">سياسة الخصوصية</a></p>
    </footer>

    <script>
        // Data for Wilaya -> Daïra mapping
        const daïraData = {
            "01": ["أدرار", "تيميمون", "شروين", "رقان"],
            "02": ["الشلف", "تنس", "أولاد فارس", "بوقادير"],
            "09": ["البليدة", "بوفاريك", "أولاد يعيش", "العفرون", "موزاية"],
            "16": ["الجزائر الوسطى", "باب الوادي", "الحراش", "الرويبة", "بئر مراد رايس"],
            "31": ["وهران", "عين الترك", "قديل", "أرزيو", "السانية"],
            "25": ["قسنطينة", "الخروب", "عين سمارة", "زيغود يوسف"]
        };

        function updateDaïras() {
            const wilayaSelect = document.getElementById('wilaya');
            const dairaSelect = document.getElementById('daira');
            const selectedWilaya = wilayaSelect.value;

            // Reset options
            dairaSelect.innerHTML = '<option value="">اختر الدائرة/البلدية</option>';

            // Populate new options
            if (daïraData[selectedWilaya]) {
                daïraData[selectedWilaya].forEach(daira => {
                    let option = document.createElement('option');
                    option.value = daira;
                    option.text = daira;
                    dairaSelect.add(option);
                });
            } else {
                // Generic fallback for demo purposes if not in map
                let option = document.createElement('option');
                option.value = "عام";
                option.text = "دائرة رئيسية (عام)";
                dairaSelect.add(option);
            }
        }

        function selectType(element, type) {
            document.querySelectorAll('.type-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            console.log("Selected Type: " + type);
        }
    </script>
</body>
</html>
