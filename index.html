<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة التربية | Tarbiya Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-sans-arabic@5.0.8/index.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"IBM Plex Sans Arabic"', 'system-ui', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            accent: '#8b5cf6',
            teal: '#14b8a6'
          }
        }
      }
    }
  </script>
  <style>
    .card-hover { transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 18px 25px -8px rgba(99,102,241,0.18); }
    .fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .blob { position: fixed; width: 350px; height: 350px; filter: blur(90px); opacity: 0.2; border-radius: 50%; z-index: -1; pointer-events: none; }
    .blob-1 { top: -60px; right: -60px; background: linear-gradient(135deg,#6366f1,#ec4899); animation: drift 12s infinite alternate ease-in-out; }
    .blob-2 { bottom: -60px; left: -60px; background: linear-gradient(135deg,#14b8a6,#3b82f6); animation: drift 14s infinite alternate-reverse ease-in-out; }
    @keyframes drift { 0%{transform:translate(0,0) scale(1)}100%{transform:translate(35px,-25px) scale(1.15)} }
    .btn-press:active { transform: scale(0.96); }
    .toast-in { animation: toastIn 0.35s ease-out forwards; }
    .toast-out { animation: toastOut 0.25s ease-in forwards; }
    @keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(30px)} }
    input:focus, select:focus, textarea:focus { outline:none; box-shadow:0 0 0 3px rgba(99,102,241,0.25); }
    .hidden { display: none !important; }
    .tab-active { background:white; color:#6366f1; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .dark .tab-active { background:#374151; color:#a5b4fc; }
    .badge-parent { background:#dbeafe; color:#1d4ed8; }
    .dark .badge-parent { background:#1e3a8a40; color:#60a5fa; }
    .badge-teacher { background:#dcfce7; color:#15803d; }
    .dark .badge-teacher { background:#14532d40; color:#4ade80; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300 min-h-screen">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Toast Container -->
  <div id="toast-box" class="fixed top-5 left-5 z-50 flex flex-col gap-3"></div>

  <header class="sticky top-0 z-40 backdrop-blur-xl bg-white/80 dark:bg-gray-900/80 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-5xl mx-auto px-5 py-3 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-gradient-to-br from-primary to-accent rounded-xl flex items-center justify-center text-white text-lg shadow-md">🏫</div>
        <span class="text-lg font-extrabold bg-clip-text text-transparent bg-gradient-to-l from-primary to-accent">منصة التربية</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="theme-btn" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition btn-press">🌙</button>
        <button id="logout-btn" class="hidden px-3 py-2 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-lg hover:bg-rose-200 dark:hover:bg-rose-900/50 transition font-bold text-xs btn-press">
          <i class="fa-solid fa-right-from-bracket ml-1"></i> خروج
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-5 py-10">

    <!-- Auth Section -->
    <section id="auth-view" class="fade-up">
      <div class="max-w-md mx-auto bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-gray-200 dark:border-gray-800">
        <div class="text-center mb-8">
          <div class="w-18 h-18 bg-gradient-to-br from-teal to-primary rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-xl">🎓</div>
          <h2 class="text-2xl font-extrabold mb-2">مرحباً بك</h2>
          <p class="text-gray-500 dark:text-gray-400 text-sm">سجّل دخولك أو أنشئ حساباً جديداً</p>
        </div>

        <div class="flex bg-gray-100 dark:bg-gray-800 rounded-lg p-1 mb-6 text-sm font-bold">
          <button id="tab-login" class="flex-1 py-2 rounded-md transition-all tab-active" onclick="switchAuth('login')">تسجيل الدخول</button>
          <button id="tab-reg" class="flex-1 py-2 rounded-md transition-all text-gray-500" onclick="switchAuth('reg')">حساب جديد</button>
        </div>

        <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
          <div class="relative">
            <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="l-user" class="w-full pr-11 pl-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition" placeholder="اسم المستخدم" required>
          </div>
          <div class="relative">
            <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="l-pass" class="w-full pr-11 pl-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition" placeholder="كلمة المرور" required>
          </div>
          <button type="submit" class="w-full py-3.5 bg-gradient-to-l from-primary to-accent text-white font-bold rounded-xl shadow-lg hover:shadow-lg hover:-translate-y-0.5 transition-all btn-press flex items-center justify-center gap-2">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> دخول
          </button>
        </form>

        <form id="reg-form" class="space-y-4 hidden" onsubmit="handleRegister(event)">
          <div class="relative">
            <i class="fa-solid fa-user absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="r-user" class="w-full pr-11 pl-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition" placeholder="اسم المستخدم" required>
          </div>
          <div class="relative">
            <i class="fa-solid fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="r-pass" class="w-full pr-11 pl-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition" placeholder="كلمة المرور" required>
          </div>
          <div class="relative">
            <i class="fa-solid fa-id-badge absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <select id="r-role" class="w-full pr-11 pl-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition appearance-none cursor-pointer">
              <option value="parent">ولي أمر 👨‍👩‍👧</option>
              <option value="teacher">أستاذ 👨‍🏫</option>
            </select>
          </div>
          <button type="submit" class="w-full py-3.5 bg-gradient-to-l from-teal to-primary text-white font-bold rounded-xl shadow-lg hover:shadow-lg hover:-translate-y-0.5 transition-all btn-press flex items-center justify-center gap-2">
            <i class="fa-solid fa-user-plus"></i> إنشاء حساب
          </button>
        </form>
      </div>
    </section>

    <!-- Dashboard Section -->
    <section id="dash-view" class="hidden fade-up">
      <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl rounded-2xl shadow-lg p-6 mb-8 border border-gray-200 dark:border-gray-800 flex items-center justify-between flex-wrap gap-4">
        <div class="flex items-center gap-4">
          <div id="avatar" class="w-14 h-14 bg-gradient-to-br from-teal to-primary rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-md">👤</div>
          <div>
            <h2 id="w-msg" class="text-xl font-extrabold">مرحباً!</h2>
            <span id="role-badge" class="inline-block px-2 py-0.5 rounded-full text-xs font-bold badge-parent">ولي</span>
          </div>
        </div>
        <button id="post-btn" class="hidden px-5 py-2.5 bg-gradient-to-l from-primary to-accent text-white font-bold rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all btn-press text-sm">
          <i class="fa-solid fa-plus ml-1"></i> نشر إعلان
        </button>
      </div>

      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-extrabold flex items-center gap-2"><i class="fa-solid fa-bullhorn text-primary"></i> آخر الإعلانات</h3>
        <button onclick="loadAnnouncements()" class="px-3 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition text-xs font-bold btn-press">
          <i class="fa-solid fa-rotate-right ml-1"></i> تحديث
        </button>
      </div>

      <div id="ann-list" class="grid grid-cols-1 gap-5"></div>
      <div id="empty-msg" class="hidden text-center py-16">
        <div class="text-7xl mb-4">📭</div>
        <h4 class="text-xl font-bold mb-2">لا توجد إعلانات بعد</h4>
        <p class="text-gray-500 dark:text-gray-400 text-sm">ستظهر الإعلانات هنا بمجرد نشرها</p>
      </div>
    </section>

  </main>

  <!-- Post Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-5">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-6 w-full max-w-md border border-gray-200 dark:border-gray-800">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-extrabold"><i class="fa-solid fa-pen-to-square text-primary ml-1"></i> نشر إعلان جديد</h3>
        <button onclick="closeModal()" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition btn-press"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form onsubmit="handlePost(event)" class="space-y-4">
        <input type="text" id="ann-title" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition" placeholder="العنوان..." required>
        <textarea id="ann-content" rows="5" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm transition resize-none" placeholder="المحتوى..." required></textarea>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 py-3 bg-gradient-to-l from-primary to-accent text-white font-bold rounded-xl shadow-lg hover:shadow-primary/40 hover:shadow-xl hover:-translate-y-0.5 transition-all btn-press">
            <i class="fa-solid fa-paper-plane ml-1"></i> نشر
          </button>
          <button type="button" onclick="closeModal()" class="px-5 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition font-bold text-sm btn-press">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center py-10 text-gray-400 dark:text-gray-600 text-sm fade-up" style="animation-delay: 1.2s;">
    منصة التربية © 2026
  </footer>

  <script>
    let currentUser = JSON.parse(localStorage.getItem("user") || "null");
    
    // --- Theme Toggle ---
    const tBtn = document.getElementById('theme-btn');
    function applyTheme(isDark) {
      document.documentElement.classList.toggle('dark', isDark);
      tBtn.textContent = isDark ? '☀️' : '🌙';
    }
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const storedTheme = localStorage.getItem('theme');
    applyTheme(storedTheme === 'dark' || (storedTheme === null && prefersDark));
    
    tBtn.addEventListener('click', () => {
      const isDark = !document.documentElement.classList.contains('dark');
      applyTheme(isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // --- Toast Notification ---
    function showToast(message, type = 'info') {
      const box = document.getElementById('toast-box');
      const toast = document.createElement('div');
      const colors = { success: 'bg-emerald-500', error: 'bg-rose-500', info: 'bg-primary', warning: 'bg-amber-500' };
      toast.className = `${colors[type]} text-white px-5 py-3 rounded-xl shadow-lg font-bold text-sm flex items-center gap-2 toast-in max-w-xs`;
      toast.innerHTML = `<span>${message}</span>`;
      box.appendChild(toast);
      setTimeout(() => { toast.classList.remove('toast-in'); toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 300); }, 3500);
    }

    // --- Auth Logic ---
    function switchAuth(tab) {
      const loginTab = document.getElementById('tab-login');
      const regTab = document.getElementById('tab-reg');
      const loginForm = document.getElementById('login-form');
      const regForm = document.getElementById('reg-form');
      
      if (tab === 'login') {
        loginTab.className = 'flex-1 py-2 rounded-md transition-all tab-active';
        regTab.className = 'flex-1 py-2 rounded-md transition-all text-gray-500';
        loginForm.classList.remove('hidden'); regForm.classList.add('hidden');
      } else {
        regTab.className = 'flex-1 py-2 rounded-md transition-all tab-active';
        loginTab.className = 'flex-1 py-2 rounded-md transition-all text-gray-500';
        regForm.classList.remove('hidden'); loginForm.classList.add('hidden');
      }
    }

    function handleRegister(e) {
      e.preventDefault();
      const uName = document.getElementById('r-user').value.trim();
      const uPass = document.getElementById('r-pass').value;
      const uRole = document.getElementById('r-role').value;

      let users = JSON.parse(localStorage.getItem("users") || "[]");
      if (users.find(u => u.username === uName)) {
        showToast('اسم المستخدم موجود مسبقاً ⚠️', 'warning');
        return;
      }
      
      users.push({ username: uName, password: uPass, role: uRole });
      localStorage.setItem("users", JSON.stringify(users));
      
      showToast('تم إنشاء الحساب ✅ يمكنك الدخول الآن', 'success');
      switchAuth('login');
      document.getElementById('l-user').value = uName;
      document.getElementById('r-user').value = '';
      document.getElementById('r-pass').value = '';
    }

    function handleLogin(e) {
      e.preventDefault();
      const uName = document.getElementById('l-user').value.trim();
      const uPass = document.getElementById('l-pass').value;
      
      let users = JSON.parse(localStorage.getItem("users") || "[]");
      let foundUser = users.find(u => u.username === uName && u.password === uPass);
      
      if (foundUser) {
        currentUser = foundUser;
        localStorage.setItem("user", JSON.stringify(currentUser));
        showToast('تم تسجيل الدخول بنجاح ✅', 'success');
        showDashboard();
      } else {
        showToast('اسم المستخدم أو كلمة المرور خطأ ❌', 'error');
      }
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem("user");
      location.reload();
    }

    // --- Dashboard Logic ---
    function showDashboard() {
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('dash-view').classList.remove('hidden');
      document.getElementById('logout-btn').classList.remove('hidden');

      document.getElementById('w-msg').textContent = `مرحباً، ${currentUser.username}! 👋`;
      
      const roleBadge = document.getElementById('role-badge');
      const roleLabel = currentUser.role === 'teacher' ? 'أستاذ' : 'ولي';
      roleBadge.textContent = roleLabel;
      roleBadge.className = `inline-block px-2 py-0.5 rounded-full text-xs font-bold ${currentUser.role === 'teacher' ? 'badge-teacher' : 'badge-parent'}`;
      
      document.getElementById('avatar').textContent = currentUser.role === 'teacher' ? '👨‍🏫' : '👨‍👩‍👧';

      if (currentUser.role === 'teacher') {
        document.getElementById('post-btn').classList.remove('hidden');
      }

      loadAnnouncements();
    }

    function handlePost(e) {
      e.preventDefault();
      const title = document.getElementById('ann-title').value.trim();
      const content = document.getElementById('ann-content').value.trim();
      
      let annList = JSON.parse(localStorage.getItem("ann") || "[]");
      annList.unshift({ title, content, user: currentUser.username, date: new Date() }); // Add to top
      localStorage.setItem("ann", JSON.stringify(annList));
      
      closeModal();
      showToast('تم نشر الإعلان 📢', 'success');
      loadAnnouncements();
    }

    function loadAnnouncements() {
      const listEl = document.getElementById('ann-list');
      const emptyMsg = document.getElementById('empty-msg');
      
      // Loading state simulation
      listEl.innerHTML = '<div class="flex justify-center py-8"><i class="fa-solid fa-circle-notch text-primary text-2xl loading-spinner"></i></div>';
      
      setTimeout(() => {
        const annList = JSON.parse(localStorage.getItem("ann") || "[]");
        listEl.innerHTML = '';
        
        if (annList.length === 0) {
          emptyMsg.classList.remove('hidden');
          return;
        }
        emptyMsg.classList.add('hidden');

        annList.forEach((item, index) => {
          const dateStr = new Date(item.date).toLocaleDateString('ar-DZ', { year:'numeric', month:'long', day:'numeric' });
          const card = document.createElement('div');
          card.className = `bg-white/90 dark:bg-gray-900/90 backdrop-blur rounded-2xl p-6 shadow-sm border border-gray-200 dark:border-gray-800 card-hover fade-up`;
          card.style.animationDelay = `${index * 0.1}s`;
          card.innerHTML = `
            <div class="flex items-start justify-between gap-3 mb-3">
              <h4 class="text-lg font-bold text-gray-900 dark:text-gray-100">${item.title}</h4>
              <span class="text-xs text-gray-400 whitespace-nowrap mt-1">${dateStr}</span>
            </div>
            <p class="text-gray-600 dark:text-gray-400 leading-relaxed text-sm whitespace-pre-wrap">${item.content}</p>
            <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-800 flex items-center gap-2 text-xs text-gray-400">
              <i class="fa-solid fa-user-tag"></i> ${item.user || 'مجهول'}
            </div>
          `;
          listEl.appendChild(card);
        });
      }, 300);
    }

    // --- Modal Logic ---
    document.getElementById('post-btn').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('hidden');
    });
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('ann-title').value = '';
      document.getElementById('ann-content').value = '';
    }

    // --- Init ---
    if (currentUser) showDashboard();
  </script>
</body>
</html>
